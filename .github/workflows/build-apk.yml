name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Generate app icons from icon.png
        run: |
          sudo apt-get install -y imagemagick
          # Trim black border, crop to square, then resize to each density
          convert android/icon.png -fuzz 20% -trim +repage /tmp/icon_trimmed.png
          W=$(identify -format "%w" /tmp/icon_trimmed.png)
          H=$(identify -format "%h" /tmp/icon_trimmed.png)
          S=$((W < H ? W : H))
          convert /tmp/icon_trimmed.png -gravity center -crop ${S}x${S}+0+0 +repage /tmp/icon_square.png
          declare -A sizes=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          for dir in "${!sizes[@]}"; do
            size=${sizes[$dir]}
            mkdir -p android/app/src/main/res/$dir
            convert /tmp/icon_square.png -resize ${size}x${size} android/app/src/main/res/$dir/ic_launcher.png
          done

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: workout-tracker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
