name: Deploy to server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          port:        ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=/root/workout-tracker

            # Клонируем если первый раз, иначе пулим
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/rebkavyatka/workout-tracker.git "$APP_DIR"
            else
              git -C "$APP_DIR" pull --ff-only
            fi

            # Создаём venv если нет
            if [ ! -d "$APP_DIR/venv" ]; then
              python3 -m venv "$APP_DIR/venv"
            fi

            # Обновляем зависимости
            "$APP_DIR/venv/bin/pip" install --quiet -r "$APP_DIR/requirements.txt"

            # Пишем systemd-сервис с правильными путями
            cat > /etc/systemd/system/workout-tracker.service << SVCEOF
[Unit]
Description=Workout Tracker Flask App
After=network.target

[Service]
Type=simple
User=root
WorkingDirectory=$APP_DIR
ExecStart=$APP_DIR/venv/bin/python app.py
Restart=on-failure
RestartSec=5

[Install]
WantedBy=multi-user.target
SVCEOF

            systemctl daemon-reload
            systemctl enable workout-tracker
            systemctl restart workout-tracker

            echo "✅ Deploy complete"
            systemctl status workout-tracker --no-pager -l
