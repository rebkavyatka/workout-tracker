name: Deploy to server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          port:        ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=/root/workout-tracker

            # Клонируем если первый раз, иначе пулим
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/rebkavyatka/workout-tracker.git "$APP_DIR"
            else
              git -C "$APP_DIR" pull --ff-only
            fi

            # Создаём venv если нет
            if [ ! -d "$APP_DIR/venv" ]; then
              python3 -m venv "$APP_DIR/venv"
            fi

            # Обновляем зависимости
            "$APP_DIR/venv/bin/pip" install --quiet -r "$APP_DIR/requirements.txt"

            # Пишем systemd-сервис с правильными путями
            printf '[Unit]\nDescription=Workout Tracker Flask App\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=%s\nExecStart=%s/venv/bin/python app.py\nRestart=on-failure\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n' \
              "$APP_DIR" "$APP_DIR" \
              > /etc/systemd/system/workout-tracker.service

            systemctl daemon-reload
            systemctl enable workout-tracker
            systemctl restart workout-tracker

            echo "✅ Deploy complete"
            systemctl status workout-tracker --no-pager -l
