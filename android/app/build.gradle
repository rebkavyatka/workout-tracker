plugins {
    id 'com.android.application'
}

android {
    namespace 'com.workouttracker'
    compileSdk 34

    defaultConfig {
        applicationId "com.workouttracker"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
